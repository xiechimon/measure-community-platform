openapi: 3.0.3
info:
  title: 社区服务 API (community-service)
  version: v1
  description: 数智化社区服务平台 - 社区服务。契约骨架,业务接口随开发计划补齐。
servers:
  - url: http://localhost:9090
    description: 经网关访问
security:
  - bearerAuth: []
tags:
  - name: 社区服务
paths:
  /api/v1/service/ping:
    get:
      tags: [社区服务]
      summary: 健康探针
      operationId: ping
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  code: { type: integer, example: 200 }
                  message: { type: string }
                  data: { type: string, example: community-service ok }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
