# 导入 Nacos(命名空间 74193cd9-...)后作为 community-auth 的业务配置。
# 生产用真实数据源/密钥覆盖 application-local.yml。
server:
  port: 9093
spring:
  datasource:
    dynamic:
      primary: master
      strict: false
      datasource:
        master:
          url: jdbc:mysql://${SERVER_ADDRESS:127.0.0.1}:3306/measure_community?useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
          username: root
          password: ${MYSQL_ROOT_PASSWORD}
          driver-class-name: com.mysql.cj.jdbc.Driver
jwt:
  secret: measure-community-dev-jwt-secret
  expire-seconds: 7200
