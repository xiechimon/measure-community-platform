# 导入 Nacos 后作为 community-gateway 的路由配置。
spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: community-info
          uri: lb://community-info
          predicates:
            - Path=/api/v1/population/**
        - id: community-auth
          uri: lb://community-auth
          predicates:
            - Path=/community-auth/**
          filters:
            - StripPrefix=1
