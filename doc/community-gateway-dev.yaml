# 导入 Nacos 后作为 community-gateway 的路由配置。
server:
  port: 9090
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,redis,discoveryComposite
spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: community-info
          uri: lb://community-info
          predicates:
            - Path=/api/v1/population/**
        - id: community-portal
          uri: lb://community-portal
          predicates:
            - Path=/api/v1/portal/**
        - id: community-service
          uri: lb://community-service
          predicates:
            - Path=/api/v1/service/**
        - id: community-welfare
          uri: lb://community-welfare
          predicates:
            - Path=/api/v1/welfare/**
        - id: community-affairs
          uri: lb://community-affairs
          predicates:
            - Path=/api/v1/affairs/**
        - id: community-auth
          uri: lb://community-auth
          predicates:
            - Path=/api/v1/auth/**
