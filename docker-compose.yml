# 本地依赖栈:Nacos(注册/配置)+ MySQL(业务库,自动建表)+ Redis(会话/token)
# 用法:
#   docker compose up -d          # 起三个依赖
#   docker compose ps             # 看健康状态
#   docker compose down           # 停(保留数据卷)
#   docker compose down -v        # 停并清数据
# 起来后仍需:① Nacos 建命名空间 74193cd9-fac4-4f2a-addc-47c60508b15c
#             ② 导入 doc/*.yaml 到该命名空间(见 README/ROADMAP)
# 之后在宿主机跑:mvn -pl community-gateway spring-boot:run / mvn -pl community-info -am spring-boot:run

