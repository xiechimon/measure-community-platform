  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: mc-nacos
    restart: unless-stopped
    environment:
      MODE: standalone            # 单机模式,内嵌 Derby,无需额外 DB
      NACOS_AUTH_ENABLE: "true"   # 应用以 nacos/nacos 连接(见各模块 application.yml 默认值)
      # 2.2+ 开启鉴权必须提供以下三项,否则启动失败;控制台登录仍为 nacos/nacos
      NACOS_AUTH_TOKEN: VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=
      NACOS_AUTH_IDENTITY_KEY: serverIdentity
      NACOS_AUTH_IDENTITY_VALUE: security
      # 单机内嵌 Derby:堆给足 + 显式收窄新生代,否则 Xmn==Xmx 导致老年代≈0,
      # 首次建库触发狂刷 Full GC → 拖过 Derby 30s 登录超时 → 建库夭折留下半成品目录
      JVM_XMS: 512m
      JVM_XMX: 1024m
      JVM_XMN: 256m
    ports:
      - "127.0.0.1:8848:8848"     # 主端口 / 控制台
      - "127.0.0.1:9848:9848"     # 2.x gRPC(客户端必需)
    volumes:
      # v2:换新卷,绕开旧卷里那份建库夭折的残缺 Derby(旧卷 mc-nacos-data 弃用即可,无需删除)
      - mc-nacos-data-v2:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mc-mysql-data:
  mc-redis-data:
  mc-nacos-data-v2:
